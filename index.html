<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beykly | Lo rico también puede ser sano</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Red+Hat+Display:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--verde:#385736;
--verde-oscuro:#2a4229;
--dorado:#C5A059;
--blanco:#fff;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Red Hat Display',sans-serif;
color:var(--verde);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 8%;
position:fixed;
width:100%;
top:0;
background:rgba(56,87,54,.95);
backdrop-filter:blur(8px);
border-bottom:2px solid var(--dorado);
z-index:1000;
transition:all .3s ease;
}

/* SCROLL */
header.scrolled{
padding:8px 8%;
}

/* LOGO */
.logo img{
height:110px;
transition:.3s;
}

header.scrolled .logo img{
height:80px;
}

.logo img:hover{
transform:scale(1.04);
}

/* NAV */
nav{
display:flex;
gap:35px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
font-weight:500;
letter-spacing:1px;
position:relative;
opacity:.9;
}

nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:var(--dorado);
transition:.3s;
}

nav a:hover{
opacity:1;
}

nav a:hover::after{
width:100%;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
url('fondo.png') center/cover no-repeat;
padding:0 20px;
}

.hero h1{
font-family:'Poppins';
font-size:clamp(2.5rem,5vw,3.5rem);
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

.hero p{
margin:20px 0;
opacity:.9;
}

/* BOTÓN */
.btn{
background:var(--dorado);
color:var(--verde);
padding:14px 35px;
border-radius:50px;
text-decoration:none;
font-weight:700;
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
}

/* BENEFITS */
.benefits{
padding:100px 8%;
background:#f9f9f9;
}

.section-title{
text-align:center;
font-family:'Poppins';
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.item{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
border-top:3px solid var(--dorado);
transition:.3s;
}

.item:hover{
transform:translateY(-6px);
}

.item i{
font-size:30px;
margin-bottom:10px;
}

/* SOCIAL */
.social{
padding:80px 8%;
text-align:center;
}

.icons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.icons a{
width:60px;
height:60px;
border-radius:50%;
background:#f1f1f1;
display:flex;
align-items:center;
justify-content:center;
color:var(--verde);
transition:.3s;
}

.icons a:hover{
transform:translateY(-5px);
}

/* FOOTER */
footer{
background:var(--verde-oscuro);
color:white;
text-align:center;
padding:40px;
}

/* MOBILE */
@media(max-width:768px){

.logo img{
height:80px;
}

header.scrolled .logo img{
height:65px;
}

nav{
display:none;
}

.hero h1{
font-size:2rem;
}

}
</style>
</head>

<body>

<header id="header">
<div class="logo">
<img src="logo.png" alt="Beykly">
</div>

<nav>
<a href="#inicio">Inicio</a>
<a href="#beneficios">Beneficios</a>
<a href="menu.html">Menú</a>
</nav>
</header>

<section class="hero" id="inicio">
<h1>Lo rico también puede ser sano</h1>
<p>Postres gourmet creados con ingredientes reales</p>
<a href="menu.html" class="btn">Ver Menú</a>
</section>

<section class="benefits" id="beneficios">
<h2 class="section-title">¿Por qué elegir Beykly?</h2>

<div class="grid">
<div class="item"><i class="fas fa-leaf"></i><p>Veganos</p></div>
<div class="item"><i class="fas fa-fire"></i><p>Keto Friendly</p></div>
<div class="item"><i class="fas fa-ban"></i><p>Sin Azúcar</p></div>
<div class="item"><i class="fas fa-heart"></i><p>Bajo en Calorías</p></div>
</div>

</section>

<section class="social">
<h2>Contáctanos</h2>

<div class="icons">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

</section>

<footer>
<p>&copy; 2026 Beykly</p>
</footer>

<script>
window.addEventListener("scroll",()=>{
const header=document.getElementById("header");
header.classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
